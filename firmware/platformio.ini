; platformio.ini — Cấu hình PlatformIO cho ESP32
; Mộc Đạo Tu Tiên Firmware

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Cổng kết nối cho nạp code và Serial Monitor
upload_port = COM3
monitor_port = COM3
; Tốc độ nạp code & Serial Monitor
upload_speed   = 921600
monitor_speed  = 115200

; Thư viện cần thiết
lib_deps =
    ; JSON
    bblanchon/ArduinoJson @ ^7.0.0

    ; DHT22 (Nhiệt độ & Độ ẩm không khí)
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14

    ; BH1750 (Cảm biến ánh sáng)
    claws/BH1750 @ ^1.3.0

    ; OLED SSD1306 (128x64)
    adafruit/Adafruit SSD1306 @ ^2.5.10
    adafruit/Adafruit GFX Library @ ^1.11.9

    ; MQTT Client
    knolleary/PubSubClient @ ^2.8

    ; WiFiManager
    tzapu/WiFiManager @ ^2.0.16-rc.2

; Tùy chọn build
build_flags =
    -DCORE_DEBUG_LEVEL=3    ; 0=None 1=Error 2=Warn 3=Info 4=Debug 5=Verbose
