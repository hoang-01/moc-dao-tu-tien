; platformio.ini — Cấu hình PlatformIO cho ESP32
; Mộc Đạo Tu Tiên Firmware

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino
board_build.f_cpu = 240000000L ; Dat lai xung nhip 240MHz (mac dinh) de I2C on dinh


; Cố định cổng COM
upload_port  = COM3
monitor_port = COM3

; Tốc độ nạp code & Serial Monitor
upload_speed  = 921600
monitor_speed = 115200

; Thư viện cần thiết
lib_deps =
    ; JSON
    bblanchon/ArduinoJson @ ^7.0.0

    ; DHT22 (Nhiệt độ & Độ ẩm không khí)
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14

    ; BH1750 (Cảm biến ánh sáng)
    claws/BH1750 @ ^1.3.0

    ; OLED SSD1306 (128x64)
    adafruit/Adafruit SSD1306 @ ^2.5.10
    adafruit/Adafruit GFX Library @ ^1.11.9

    ; MQTT Client
    knolleary/PubSubClient @ ^2.8

; Tùy chọn build
build_flags =
    -DCORE_DEBUG_LEVEL=3
